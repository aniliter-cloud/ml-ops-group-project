name: Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: "Text to classify (e.g. I feel really scared)"
        required: true
        type: string

      hf_model_name:
        description: "Hugging Face model repository"
        required: false
        default: "Maxii2tj/emotion-distilbert"
        type: string

jobs:
  infer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-inference.txt

      - name: Run inference
        env:
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
          HF_MODEL_NAME: ${{ github.event.inputs.hf_model_name }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python src/inference.py